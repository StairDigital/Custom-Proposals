<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STAIR Digital - Your AI-First Proposal</title>
<style>
:root{
 --gold:#B79B60;--goldd:#9A7F46;--char:#14161A;--deep:#0E0F12;--ivory:#F5F1E8;--dim:#C9C4B8;
 --line:rgba(183,155,96,0.30);--ink:#23252A;--mute:#54565B;--paper:#FCFAF4;--pline:#E7E0CF;
 --serif:Georgia,"Times New Roman",serif;--sans:ui-sans-serif,system-ui,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--deep);color:var(--ivory);font-family:var(--sans);min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:0 22px 72px}
header{display:flex;align-items:center;justify-content:space-between;padding:26px 0 6px}
header .logo{height:84px;width:auto;display:block}
.ghost:hover{border-color:var(--gold);color:var(--gold)}
.ghost{transition:border-color .2s ease,color .2s ease,background .2s ease}
.ghost{background:transparent;color:var(--ivory);border:1px solid var(--line);border-radius:2px;padding:8px 14px;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block}
.hero{text-align:center;padding:44px 0 26px}
.eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(30px,7vw,40px);line-height:1.12;margin:16px 0 12px}
.hero p{color:var(--dim);font-size:16px;line-height:1.6;max-width:560px;margin:0 auto}
.panel{background:var(--char);border:1px solid var(--line);border-radius:4px;padding:26px 24px;transition:border-color .25s ease}
.row{display:flex;gap:14px;flex-wrap:wrap}
.field{flex:1 1 220px}
label{display:block;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
input{width:100%;background:var(--deep);color:var(--ivory);border:1px solid var(--line);border-radius:2px;padding:12px 13px;font-size:15px;outline:none;font-family:var(--sans);transition:border-color .2s ease,box-shadow .2s ease}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(183,155,96,.14)}
input::placeholder{color:#6f6f66}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{background:transparent;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer}
.cta{width:100%;margin-top:20px;background:var(--gold);color:var(--deep);border:none;border-radius:2px;padding:14px;font-size:14px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;transition:transform .12s ease,background .2s ease,box-shadow .2s ease}
.cta:hover{background:#c7ab70;box-shadow:0 8px 22px rgba(183,155,96,.28)}
.cta:active{transform:translateY(1px)}
.cta[disabled]{opacity:.7;cursor:default;box-shadow:none}
.hint{font-size:11.5px;color:var(--dim);margin-top:12px;text-align:center}
.err{color:#E0917F;font-size:13px;margin-top:12px}
.loading{display:none;flex-direction:column;align-items:center;gap:14px;margin-top:30px;color:var(--dim)}
.loading .lrow{display:flex;align-items:center;gap:12px;font-size:13.5px;letter-spacing:.4px}
.spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;display:inline-block;animation:spin .8s linear infinite}
.bar{width:100%;max-width:420px;height:3px;background:rgba(183,155,96,.16);border-radius:3px;overflow:hidden}
.bar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--goldd),var(--gold));border-radius:3px;transition:width .5s ease}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade{animation:fade .55s cubic-bezier(.2,.7,.2,1) both}
.sheet{opacity:0;transform:translateY(14px);animation:fade .6s ease both}
.sheet:nth-of-type(2){animation-delay:.12s}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.sheet{opacity:1;transform:none}}
.readybar{background:var(--char);border:1px solid var(--line);border-radius:4px;padding:16px 20px;margin:10px 0 22px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.tick{width:30px;height:30px;border-radius:50%;background:var(--gold);color:var(--deep);display:flex;align-items:center;justify-content:center;font-weight:800}
.ctasm{background:var(--gold);color:var(--deep);border:none;border-radius:2px;padding:8px 14px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block}
.pill{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--goldd);border:1px solid var(--line);border-radius:999px;padding:3px 9px}
.sheet{background:var(--paper);color:var(--ink);border-radius:4px;padding:34px 38px;margin-bottom:20px;box-shadow:0 18px 50px rgba(0,0,0,.45);position:relative;overflow:hidden}
.rule{height:1px;background:var(--gold);margin:18px 0 22px}
.prepared{display:flex;align-items:center}
.seclbl{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--goldd);margin:0 0 6px}
.frow{display:flex;gap:16px;padding:13px 0;border-top:1px solid var(--pline)}
.ftheme{min-width:128px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--goldd);font-weight:700}
.ftitle{font-weight:700;font-size:14.5px;color:var(--ink)}
.fdetail{font-size:13.5px;line-height:1.55;color:var(--mute);margin-top:2px}
.arow{display:flex;gap:14px;padding:10px 0}
.anum{font-family:var(--serif);color:var(--goldd);font-size:17px;min-width:26px}
.clogo{object-fit:contain;border-radius:8px;background:#fff;border:1px solid var(--pline);padding:4px;margin-right:16px}
.pagefoot{font-size:10.5px;letter-spacing:1px;color:#9A9588;margin-top:24px;text-align:center;text-transform:uppercase}
.cred{display:grid;grid-template-columns:1fr 1fr;gap:10px 22px}
.cred>div{display:flex;gap:8px;font-size:12.5px;line-height:1.5;color:var(--ink)}
.ctaband{background:var(--char);color:var(--ivory);border-radius:4px;padding:22px 24px;margin-top:26px;text-align:center}
.ctaband .h{font-family:var(--serif);font-size:20px;margin-bottom:6px}
.ctagold{background:var(--gold);color:var(--deep);border:none;border-radius:2px;padding:11px 22px;font-size:12.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block}
.impact{background:#F3EEE0;border-radius:4px;padding:18px 20px;margin:22px 0;display:flex;gap:18px;flex-wrap:wrap}
.impact .it{flex:1 1 150px;display:flex;gap:8px;font-size:13px;line-height:1.45;color:var(--ink)}
.watermark{position:absolute;right:-40px;bottom:-30px;width:280px;opacity:.045;pointer-events:none}
.sig{display:flex;justify-content:space-between;align-items:center;margin-top:24px;flex-wrap:wrap;gap:8px;font-size:13px;color:var(--ink)}
.bottomactions{text-align:center;margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.cta2{background:var(--gold);color:var(--deep);border:none;border-radius:2px;padding:12px 24px;font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer}
@media (max-width:600px){
 .wrap{padding:0 16px 56px}
 header{padding:18px 0 4px}
 header .logo{height:62px}
 .ghost{padding:7px 11px;font-size:11px}
 .hero{padding:30px 0 22px}
 .panel{padding:22px 18px}
 .readybar{padding:14px 16px}
 .sheet{padding:24px 20px}
 .frow{flex-direction:column;gap:4px}
 .ftheme{min-width:0}
 .cred{grid-template-columns:1fr;gap:9px}
 .sig{flex-direction:column;align-items:flex-start}
 .ctaband{padding:20px 18px}
 .watermark{width:200px;right:-30px}
}
@media print{
 body *{visibility:hidden}
 #doc,#doc *{visibility:visible}
 #doc{position:absolute;left:0;top:0;width:100%}
 .sheet{box-shadow:none!important;margin:0!important;page-break-after:always;border:none!important;opacity:1!important;transform:none!important;animation:none!important}
}
</style>
</head>
<body>
<div class="wrap">
 <header>
  <svg class="logo" viewBox="0 0 112 92" role="img" aria-label="STAIR Digital"><g fill="#F5F1E8" transform="translate(28,3)"><polygon points="24,2 46,2 55,20 24,20"/><polygon points="2,20 33,20 33,38 11,38"/></g><text x="56" y="68" font-family="Georgia,'Times New Roman',serif" font-size="25" letter-spacing="4" fill="#F5F1E8" text-anchor="middle">STAIR</text><text x="57" y="83" font-family="Georgia,serif" font-size="7.5" letter-spacing="4.5" fill="#B79B60" text-anchor="middle">DIGITAL</text></svg>
  <button class="ghost" onclick="saveContact()">Save contact</button>
 </header>

 <section id="intro">
  <div class="hero">
   <div class="eyebrow">Governance-led AI</div>
   <h1>Your AI-first proposal,<br/>drafted in real time</h1>
  </div>
  <div class="panel">
   <div class="row">
    <div class="field"><label>Your name</label>
     <input id="name" placeholder="Full name"/></div>
    <div class="field"><label>Company</label>
     <input id="company" placeholder="Your company" onkeydown="if(event.key==='Enter')generate()"/></div>
   </div>
   <button class="cta" id="genBtn" onclick="generate()"><span>Generate my proposal</span></button>
   <div class="err" id="err" style="display:none"></div>
   <div class="hint">A board-ready sketch in seconds. A full proposal follows a conversation.</div>
  </div>
 </section>

 <div class="loading" id="loading">
  <div class="lrow"><span class="spin"></span><span id="loadtext"></span></div>
  <div class="bar"><span id="loadbar"></span></div>
 </div>

 <div id="result"></div>
</div>

<script>
const LOGO_DARK="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20112%2092%22%3E%3Cg%20fill%3D%22%2314161A%22%20transform%3D%22translate%2828%2C3%29%22%3E%3Cpolygon%20points%3D%2224%2C2%2046%2C2%2055%2C20%2024%2C20%22/%3E%3Cpolygon%20points%3D%222%2C20%2033%2C20%2033%2C38%2011%2C38%22/%3E%3C/g%3E%3Ctext%20x%3D%2256%22%20y%3D%2268%22%20font-family%3D%22Georgia%2C%26apos%3BTimes%20New%20Roman%26apos%3B%2Cserif%22%20font-size%3D%2225%22%20letter-spacing%3D%224%22%20fill%3D%22%2314161A%22%20text-anchor%3D%22middle%22%3ESTAIR%3C/text%3E%3Ctext%20x%3D%2257%22%20y%3D%2283%22%20font-family%3D%22Georgia%2Cserif%22%20font-size%3D%227.5%22%20letter-spacing%3D%224.5%22%20fill%3D%22%23B79B60%22%20text-anchor%3D%22middle%22%3EDIGITAL%3C/text%3E%3C/svg%3E", SYMBOL="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2057%2040%22%3E%3Cg%20fill%3D%22%2314161A%22%3E%3Cpolygon%20points%3D%2224%2C2%2046%2C2%2055%2C20%2024%2C20%22/%3E%3Cpolygon%20points%3D%222%2C20%2033%2C20%2033%2C38%2011%2C38%22/%3E%3C/g%3E%3C/svg%3E";
const MEET="https://calendly.com/stair-digital/strategy-call"; // replace with real link

const VCARD=["BEGIN:VCARD","VERSION:3.0","N:Saraff;Shubham;;;","FN:Shubham Saraff",
 "ORG:STAIR Digital","TITLE:Co-Founder & Director","TEL;TYPE=CELL:+919930220342",
 "EMAIL:saraffshubham@gmail.com","URL:https://www.stair.digital","END:VCARD"].join("\n");
function saveContact(){
 const b=new Blob([VCARD],{type:"text/vcard"}), u=URL.createObjectURL(b);
 const a=document.createElement("a"); a.href=u; a.download="Shubham_Saraff_STAIR.vcf";
 document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u);
}
function esc(s){return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

const CREDENTIALS=[
 "Co-founded with Shailesh Haribhakti, Chairman, 70-plus board associations",
 "Trusted by ICICI Securities, the Adani Group, L&T, Vakils and Dinshaws",
 "Oxford Said Business School and IET pedigree; 11 years of applied AI research",
 "Co-author of The AI Auditor; TEDx speaker on AI at Oxford and Bocconi"
];

function companyToDomain(name){
 let s=(name||"").toLowerCase().replace(/&/g," and ").replace(/[^a-z0-9 ]/g,"").trim();
 s=s.replace(/\b(the|ltd|limited|inc|corp|company|co|pvt|private|group)\b/g,"").replace(/\s+/g,"");
 return s? s+".com" : "";
}

const PROMPT_HEAD=`You are the proposal engine for STAIR Digital, an institutional advisory firm that builds AI-enabled, governance-led enterprises for India's largest listed and promoter-led companies. Co-founded by Shubham Saraff and Chairman Shailesh Haribhakti. STAIR works through its Autonomous, Agentic and Augmented Intelligence (AAAi) lens and pairs board-level governance with frontier AI.

First, use the web_search tool to verify what the named company actually does: its sector, scale, recent public developments and stated priorities. Ground every company-specific claim in this verified, current public information. Do not invent facts, figures, leadership names or initiatives. If something cannot be verified, keep it general rather than fabricating specifics.

Then produce a premium, board-ready two-page proposal sketch that is specific to that company and its sector. Cover these five focus areas, each made concrete to the company: AI opportunities, operational efficiency, energy optimisation, predictive analytics, automation.

Rules: British spelling. No em dashes or en dashes anywhere, hyphens only. Specific and confident, never hype. Be concise so the whole JSON fits.

After any searching, return ONLY a valid JSON object as your final output, no preamble, no markdown fences, exactly this shape:
{"company":"","domain":"","sector":"","snapshot":"","title":"","exec":"","whyNow":"",
"focus":[{"theme":"AI opportunities","title":"","detail":""},{"theme":"Operational efficiency","title":"","detail":""},{"theme":"Energy optimisation","title":"","detail":""},{"theme":"Predictive analytics","title":"","detail":""},{"theme":"Automation","title":"","detail":""}],
"approach":[{"phase":"","detail":""},{"phase":"","detail":""},{"phase":"","detail":""}],
"governance":"","impact":["","",""],"cta":""}`;

async function callAI(name,company){
 const res=await fetch("https://api.anthropic.com/v1/messages",{
  method:"POST", headers:{"Content-Type":"application/json"},
  body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1600,
   tools:[{"type":"web_search_20250305","name":"web_search","max_uses":3}],
   messages:[{role:"user",content:PROMPT_HEAD+"\n\nProspect name: "+name+"\nCompany: "+company}]})
 });
 if(!res.ok) throw new Error("http "+res.status);
 const data=await res.json();
 let t=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim().replace(/```json|```/g,"").trim();
 const a=t.indexOf("{"),z=t.lastIndexOf("}"); if(a>=0&&z>a)t=t.slice(a,z+1);
 return JSON.parse(t);
}

function demoProposal(company){
 const C=company;
 return {
  company:C, domain:companyToDomain(C), sector:"", snapshot:"",
  title:"An AI-First Blueprint for "+C,
  exec:C+" sits at a moment where artificial intelligence can compound efficiency, insight and growth at once. STAIR would partner with "+C+"'s leadership to find the highest-return AI opportunities and deliver them under board-grade governance.",
  whyNow:"Across your industry, the firms that embed AI now will set the cost and experience benchmark that others spend years chasing.",
  focus:[
   {theme:"AI opportunities",title:"Customer-facing intelligence",detail:"Bring AI assistants and recommendation engines into "+C+"'s customer journey to lift conversion and lifetime value."},
   {theme:"Operational efficiency",title:"Process intelligence",detail:"Map "+C+"'s core workflows and remove manual handoffs with agentic automation, freeing teams for higher-value work."},
   {theme:"Energy optimisation",title:"Smart consumption",detail:"Forecast and optimise energy use across "+C+"'s facilities and infrastructure to cut both cost and carbon."},
   {theme:"Predictive analytics",title:"Demand and risk foresight",detail:"Turn "+C+"'s historical data into forward decisions on demand, churn and risk."},
   {theme:"Automation",title:"Back-office automation",detail:"Automate repetitive finance, support and reporting tasks at "+C+" with governed AI agents."}
  ],
  approach:[
   {phase:"Diagnose",detail:"A focused audit of "+C+"'s data, processes and quick-win AI opportunities."},
   {phase:"Pilot",detail:"Build and prove one or two high-impact use cases with measurable outcomes."},
   {phase:"Scale",detail:"Industrialise what works across "+C+" with governance, training and an operating model."}
  ],
  governance:"Every model is deployed with transparency, human oversight and audit trails, so "+C+"'s board retains full confidence and control.",
  impact:["Lower operating cost","Faster, sharper decisions","A defensible AI advantage"],
  cta:"Let us map "+C+"'s AI roadmap together."
 };
}

function logoEl(domain,name,size){
 const span=document.createElement("span");
 if(!domain){ return span; }
 const img=document.createElement("img");
 img.className="clogo"; img.style.width=size+"px"; img.style.height=size+"px"; img.alt=name||"";
 img.style.display="none"; // stay hidden until a real logo loads
 img.onload=function(){ img.style.display="block"; };
 img.onerror=function(){ img.remove(); }; // logo not found: show nothing
 img.src="https://logo.clearbit.com/"+domain;
 span.appendChild(img);
 return span;
}

let STEP_TIMER=null;
const STEPS=["Reading ${C} and its sector","Checking verified public sources","Mapping AI, efficiency, energy and automation gains","Shaping the engagement","Applying STAIR governance","Typesetting your two-page proposal"];
function startLoading(company){
 const L=document.getElementById("loading"); L.style.display="flex";
 const steps=STEPS.map(s=>s.replace("${C}",company||"your company"));
 let i=0;
 const tx=document.getElementById("loadtext"), bar=document.getElementById("loadbar");
 tx.textContent=steps[0]; bar.style.width="8%";
 STEP_TIMER=setInterval(()=>{
  i=Math.min(i+1,steps.length-1);
  tx.textContent=steps[i];
  bar.style.width=(8+(i/(steps.length-1))*82)+"%";
 },1700);
}
function stopLoading(){
 const bar=document.getElementById("loadbar"); if(bar)bar.style.width="100%";
 if(STEP_TIMER)clearInterval(STEP_TIMER);
 setTimeout(()=>{document.getElementById("loading").style.display="none";if(bar)bar.style.width="0";},280);
}

async function generate(){
 const name=document.getElementById("name").value.trim();
 const company=document.getElementById("company").value.trim();
 const err=document.getElementById("err");
 if(!name||!company){ err.style.display="block"; err.textContent="Please add your name and company."; return; }
 err.style.display="none";
 const btn=document.getElementById("genBtn"); btn.disabled=true; btn.querySelector("span").textContent="Building your proposal";
 startLoading(company);
 let data, demo=false;
 try{ data=await callAI(name,company); }
 catch(e){ demo=true; data=demoProposal(company); }
 stopLoading(); btn.disabled=false; btn.querySelector("span").textContent="Generate my proposal";
 render(data,demo);
}

function render(d,demo){
 const date=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
 const focus=(d.focus||[]).map(f=>`<div class="frow"><div class="ftheme">${esc(f.theme)}</div><div><div class="ftitle">${esc(f.title)}</div><div class="fdetail">${esc(f.detail)}</div></div></div>`).join("");
 const approach=(d.approach||[]).map((a,i)=>`<div class="arow" style="border-top:${i?"1px solid var(--pline)":"none"}"><div class="anum">0${i+1}</div><div><b style="font-size:14px;color:var(--ink)">${esc(a.phase)}. </b><span style="font-size:13.5px;line-height:1.55;color:var(--mute)">${esc(a.detail)}</span></div></div>`).join("");
 const impact=(d.impact||[]).map(x=>`<div class="it"><span style="color:var(--goldd);font-weight:800">&#10003;</span><span>${esc(x)}</span></div>`).join("");
 const creds=CREDENTIALS.map(c=>`<div><span style="color:var(--goldd)">&#8226;</span><span>${esc(c)}</span></div>`).join("");

 const html=`
 <div class="fade">
  <div class="readybar">
   <div class="tick">&#10003;</div>
   <div style="flex:1 1 220px;font-size:14px">Your two-page proposal for <b>${esc(d.company)}</b> is ready below.</div>
   <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="ctasm" onclick="window.print()">Download PDF</button>
   </div>
  </div>
  <div id="doc">
   <div class="sheet">
    <img class="watermark" src="${SYMBOL}" alt=""/>
    <div style="position:relative">
     <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <img src="${LOGO_DARK}" alt="STAIR Digital" style="height:48px"/>
      <div style="text-align:right;font-size:10.5px;color:var(--mute);letter-spacing:.6px">CONFIDENTIAL PROPOSAL<br/>${date}</div>
     </div>
     <div class="rule"></div>
     <div class="prepared">
      <span id="clogoSlot"></span>
      <div><div style="font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--goldd)">Prepared for</div>
       <div style="font-family:var(--serif);font-size:23px;color:var(--ink);line-height:1.1">${esc(d.company)}</div>
       ${d.sector?`<div style="font-size:12.5px;color:var(--mute);margin-top:2px">${esc(d.sector)}</div>`:''}</div>
     </div>
     ${d.snapshot?`<div style="font-size:12.5px;color:var(--mute);margin-top:10px;font-style:italic">${esc(d.snapshot)}</div>`:''}
     <h1 style="font-family:var(--serif);font-size:31px;line-height:1.15;color:var(--ink);margin:24px 0 12px">${esc(d.title)}</h1>
     <p style="font-size:14.5px;line-height:1.65;color:var(--ink);margin:0 0 10px">${esc(d.exec)}</p>
     ${d.whyNow?`<p style="font-size:14px;line-height:1.55;color:var(--goldd);font-style:italic;border-left:2px solid var(--gold);padding-left:12px;margin:0 0 24px">${esc(d.whyNow)}</p>`:''}
     <div class="seclbl">Where AI moves the needle</div>
     ${focus}
    </div>
   </div>

   <div class="sheet">
    <div class="seclbl">How STAIR delivers</div>
    ${approach}
    <div class="impact"><div class="seclbl" style="flex:1 1 100%;margin-bottom:4px">Expected impact</div>${impact}</div>
    <div class="seclbl">Governance built in</div>
    <p style="font-size:13.5px;line-height:1.55;color:var(--mute);margin:0">${esc(d.governance)}</p>
    <div style="height:1px;background:var(--pline);margin:22px 0"></div>
